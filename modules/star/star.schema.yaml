Procedure:
    type: object
    properties:
      STAR: {type: ["string", "null"]}

outdir:
    type: string
    default: "output"
indir:
    type: string
    default: "input"
logdir:
    type: string
    default: "log"
paired_samples:
    type: array
    items:
        type: object
        properties:
            sample_id: {type: string}
single_samples:
    type: array
    items:
        type: object
        properties:
            sample_id: {type: string}
genome:
    type: object
    additionalProperties:
        type: object
        properties:
            fasta: {type: string}
            gtf: {type: string}
            star_index_dir: {type: string}
