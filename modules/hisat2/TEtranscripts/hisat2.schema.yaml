Procedure:
    type: object
    properties:
      # 以下工具路径允许为 string 或 null (对应 YAML 中的空值)
      hisat2: {type: ["string", "null"]},
      hisat2-build: {type: ["string", "null"]},
      index_prefix: {type: ["string", "null"]},
      samtools: {type: ["string", "null"]}

genome:
    type: object
    proerties:
      fasta: {type: "string"}
      gtf: {type: "string"}
      index_dir: {type: ["string", "null"]}
outdir:
    type: string
    default: "output"

logdir:
    type: string
    default: "log"
indir:
    type: string
    default: "input"
paired_samples:
    type: array
    items:
        type: string
single_samples:
    type: array
    items:
        type: string